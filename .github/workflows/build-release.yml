name: Build multiplateforme & Release

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'release.json'
      - 'index.html'

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Install ObjectBox native library
        run: bash <(curl -s https://raw.githubusercontent.com/objectbox/objectbox-dart/main/install.sh) --quiet

      - run: flutter test

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Extract version and Update pubspec.yaml
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | awk '{print $2}')
          VERSION_NAME=$(echo $VERSION | cut -d'+' -f1)
          BUILD_NUMBER=$(echo $VERSION | cut -d'+' -f2)

      

      - run: flutter pub get
      - name: Build APK
        run: |
          flutter build apk --release --build-name=$(grep 'version: ' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d '[:space:]') --build-number=${{ github.run_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Increment Windows Version
        shell: pwsh
        run: |
          $content = Get-Content pubspec.yaml -Raw
          if ($content -match 'version:\s+([^\+]+)\+') {
              $versionName = $Matches[1].Trim()
              $newVersion = "$versionName+${{ github.run_number }}"
              $content -replace '^version: .*', "version: $newVersion" | Set-Content pubspec.yaml
              
              $setupContent = Get-Content installer/setup.iss -Raw
              $setupContent -replace '#define AppVersion\s+".*"', "#define AppVersion `"$versionName.${{ github.run_number }}`"" | Set-Content installer/setup.iss
              
              Write-Host "Updated pubspec.yaml to $newVersion"
              Write-Host "Updated setup.iss version to $versionName.${{ github.run_number }}"
          }

      - run: flutter pub get

      # ✅ Build Windows
      - name: Build Windows app
        run: flutter build windows

      # ✅ DEBUG (IMPORTANT)
      - name: Check build output
        run: dir build\windows\x64\runner\Release

      # ✅ Install Inno Setup
      - run: choco install innosetup -y

      # ✅ Build installer
      - name: Build installer
        run: iscc installer/setup.iss

      # ✅ DEBUG installer
      - name: Check installer output
        run: dir installer\output

      - uses: actions/upload-artifact@v4
        with:
          name: installer.exe
          path: installer/output/*.exe

  release-and-update:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: app-release.apk

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: installer.exe

      # ✅ IMPORTANT : renommer correctement
      - name: Rename installer
        run: mv installer.exe/*.exe installer.exe || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Release v${{ github.run_number }}"
          files: |
            app-release.apk
            installer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Générer release.json et mettre à jour les fichiers
        run: |
          VERSION_NAME=$(grep 'version: ' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          NEW_VERSION="$VERSION_NAME+${{ github.run_number }}"
          
          # Mise à jour des fichiers pour le commit final
          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
          sed -i "s/#define AppVersion   \".*\"/#define AppVersion   \"$VERSION_NAME.${{ github.run_number }}\"/" installer/setup.iss

          cat > release.json << EOF
          {
            "version": "$VERSION_NAME.${{ github.run_number }}",
            "tag": "v${{ github.run_number }}",
            "date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "android": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/app-release.apk",
                "name": "app-release.apk"
              },
              "windows": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/installer.exe",
                "name": "installer.exe"
              }
            }
          }
          EOF

      - name: Commit version updates and release.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release.json pubspec.yaml installer/setup.iss
          git commit -m "chore: bump version to ${{ github.run_number }} and update release.json [skip ci]" || echo "Rien à commiter"
          git push origin master || echo "Push ignoré"
